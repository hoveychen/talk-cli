name: CLI Release

# Triggered by pushing a version tag like "v0.2.0".
# Builds the tiny talk CLI binary (no embedded assets) for all platforms
# and publishes it as a GitHub Release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build talk CLI
        run: make build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## talk  ${{ github.ref_name }}

            Multilingual TTS CLI powered by Kokoro.
            Engine and model are downloaded automatically on first use.

            | Binary | Platform |
            |--------|----------|
            | `talk-darwin-arm64` | macOS Apple Silicon (MLX + ONNX) |
            | `talk-darwin-amd64` | macOS Intel |
            | `talk-windows-amd64.exe` | Windows |

            ### Quick start

            ```bash
            # macOS Apple Silicon
            curl -fL https://github.com/hoveychen/talk-cli/releases/latest/download/talk-darwin-arm64 -o talk
            chmod +x talk

            ./talk "Hello, world!"
            ./talk "你好，欢迎使用 talk-cli"
            ./talk voices --lang zh
            ./talk init --lang all   # pre-download everything
            ```

            Engine and model are cached in `~/.cache/talk-cli/` after first download.
          files: bin/*

  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set npm version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
