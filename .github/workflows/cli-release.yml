name: CLI Release

# Triggered by pushing a version tag like "v0.2.0".
# Builds speak CLI with embedded listener for each platform,
# then publishes as a GitHub Release and to npm.

on:
  push:
    tags: ['v*', '!engine-v*']
  workflow_dispatch:

jobs:
  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build listener (Swift)
        run: |
          mkdir -p bin
          swiftc listen/listen_darwin.swift \
            -o bin/speak-listen \
            -framework Cocoa -framework Speech -framework AVFoundation \
            -O -target arm64-apple-macos13
          cp bin/speak-listen internal/listener/speak-listen

      - name: Build speak CLI
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bin/speak-darwin-arm64 ./cmd/speak

      - uses: actions/upload-artifact@v4
        with:
          name: speak-darwin-arm64
          path: bin/speak-darwin-arm64

  build-darwin-amd64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build listener (Swift)
        run: |
          mkdir -p bin
          swiftc listen/listen_darwin.swift \
            -o bin/speak-listen \
            -framework Cocoa -framework Speech -framework AVFoundation \
            -O -target x86_64-apple-macos13
          cp bin/speak-listen internal/listener/speak-listen

      - name: Build speak CLI
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bin/speak-darwin-amd64 ./cmd/speak

      - uses: actions/upload-artifact@v4
        with:
          name: speak-darwin-amd64
          path: bin/speak-darwin-amd64

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build listener (C#)
        shell: cmd
        run: |
          set CSC=%WINDIR%\Microsoft.NET\Framework64\v4.0.30319\csc.exe
          set REF=%WINDIR%\Microsoft.NET\assembly\GAC_MSIL
          mkdir bin 2>nul
          "%CSC%" /nologo /optimize /target:winexe ^
            /r:"%REF%\System.Speech\v4.0_4.0.0.0__31bf3856ad364e35\System.Speech.dll" ^
            /r:System.Windows.Forms.dll /r:System.Drawing.dll ^
            /out:bin\speak-listen.exe listen\listen_windows.cs
          copy bin\speak-listen.exe internal\listener\speak-listen.exe

      - name: Build speak CLI
        shell: bash
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bin/speak-windows-amd64.exe ./cmd/speak

      - uses: actions/upload-artifact@v4
        with:
          name: speak-windows-amd64
          path: bin/speak-windows-amd64.exe

  release:
    needs: [build-darwin-arm64, build-darwin-amd64, build-windows-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x bin/speak-darwin-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## speak  ${{ github.ref_name }}

            Multilingual TTS CLI powered by Kokoro, with built-in speech recognition.
            Engine and model are downloaded automatically on first use.
            The listener binary is embedded — no extra downloads needed for `speak listen`.

            | Binary | Platform |
            |--------|----------|
            | `speak-darwin-arm64` | macOS Apple Silicon |
            | `speak-darwin-amd64` | macOS Intel |
            | `speak-windows-amd64.exe` | Windows |

            ### Quick start

            ```bash
            # macOS Apple Silicon
            curl -fsSL https://raw.githubusercontent.com/hoveychen/speak-cli/main/install.sh | bash

            # Or manual download
            curl -fL https://github.com/hoveychen/speak-cli/releases/latest/download/speak-darwin-arm64 -o speak
            chmod +x speak

            ./speak "Hello, world!"
            ./speak listen --lang zh   # speech recognition
            ```
          files: bin/*

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set npm version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
